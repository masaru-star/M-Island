<svg width="400" height="400" viewBox="0 0 400 400" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
  <defs>
    <!-- 金色の質感を表現するグラデーション -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" /> <!-- Gold -->
      <stop offset="30%" style="stop-color:#FFFACD;stop-opacity:1" /> <!-- Lemon Chiffon (Highlight) -->
      <stop offset="60%" style="stop-color:#DAA520;stop-opacity:1" /> <!-- Goldenrod -->
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" /> <!-- Dark Goldenrod -->
    </linearGradient>
    
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 上部のベースパーツ -->
  <path d="M150 50 L250 50 L270 150 L130 150 Z" fill="#996515" stroke="#5C4033" stroke-width="2" />
  <path d="M170 50 L190 150 M210 50 L210 150 M230 50 L230 150" stroke="#FFD700" stroke-width="3" stroke-opacity="0.4" />

  <g filter="url(#shadow)">
    <!-- 大砲1 -->
    <rect x="110" y="190" width="180" height="20" rx="5" fill="url(#goldGradient)" transform="rotate(45, 200, 200)" />
    <circle cx="130" cy="130" r="12" fill="url(#goldGradient)" transform="rotate(45, 200, 200)" />
    <!-- 大砲2 -->
    <rect x="110" y="190" width="180" height="20" rx="5" fill="url(#goldGradient)" transform="rotate(-45, 200, 200)" />
    <circle cx="130" cy="270" r="12" fill="url(#goldGradient)" transform="rotate(-45, 200, 200)" />
  </g>

  <!-- 中央のメイン円盤 -->
  <circle cx="200" cy="230" r="75" fill="url(#goldGradient)" stroke="#8B6508" stroke-width="3" filter="url(#shadow)" />

  <!-- 装飾ライン -->
  <circle cx="200" cy="230" r="65" fill="none" stroke="#B8860B" stroke-width="2" stroke-dasharray="4 2" />
  
  <g stroke="#5C4033" stroke-width="4" fill="none">
    <!-- 外円 -->
    <circle cx="200" cy="230" r="40" />
    <!-- 十字線 -->
    <line x1="200" y1="180" x2="200" y2="280" />
    <line x1="150" y1="230" x2="250" y2="230" />
    <!-- 中央のドット -->
    <circle cx="200" cy="230" r="4" fill="#5C4033" />
  </g>
  
  <!-- 左右の装飾曲線 -->
  <path d="M140 260 Q130 230 140 200" fill="none" stroke="#5C4033" stroke-width="2" />
  <path d="M260 260 Q270 230 260 200" fill="none" stroke="#5C4033" stroke-width="2" />
  
  <!-- 全体のオーバーレイ光沢 -->
  <circle cx="200" cy="230" r="75" fill="url(#shineGradient)" pointer-events="none" />
</svg>
