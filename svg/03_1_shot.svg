<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 定義: グラデーションとフィルタ -->
  <defs>
    <!-- 銅のベースグラデーション -->
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b87333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d2e0c;stop-opacity:1" />
    </linearGradient>
    
    <!-- 銅のハイライトグラデーション -->
    <linearGradient id="bronzeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cd7f32;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff9966;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>

    <!-- 金属の光沢フィルタ -->
    <filter id="metalBump" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#ffffff" result="specOut">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
    
    <!-- シャドウ -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景サークル（外枠） -->
  <circle cx="200" cy="200" r="150" fill="url(#bronzeGradient)" stroke="#3e2723" stroke-width="2" filter="url(#dropShadow)" />
  
  <!-- 内側の装飾リング -->
  <circle cx="200" cy="200" r="135" fill="none" stroke="url(#bronzeHighlight)" stroke-width="4" stroke-dasharray="2,4" />
  <circle cx="200" cy="200" r="125" fill="none" stroke="#5d2e0c" stroke-width="1" />

  <!-- 月桂樹の装飾（左） -->
  <g fill="#5d2e0c" opacity="0.6">
    <path d="M110,240 Q100,200 130,140 Q115,160 115,190 Q110,180 100,185 Q110,195 115,210 Q105,205 95,215 Q110,225 115,240" />
    <path d="M120,260 Q110,220 140,160 Q125,180 125,210 Q120,200 110,205 Q120,215 125,230 Q115,225 105,235 Q120,245 125,260" />
  </g>
  
  <!-- 月桂樹の装飾（右 - 反転） -->
  <g fill="#5d2e0c" opacity="0.6" transform="translate(400,0) scale(-1,1)">
    <path d="M110,240 Q100,200 130,140 Q115,160 115,190 Q110,180 100,185 Q110,195 115,210 Q105,205 95,215 Q110,225 115,240" />
    <path d="M120,260 Q110,220 140,160 Q125,180 125,210 Q120,200 110,205 Q120,215 125,230 Q115,225 105,235 Q120,245 125,260" />
  </g>

  <!-- 中央のエンブレム背景 -->
  <circle cx="200" cy="200" r="90" fill="#3e2723" stroke="url(#bronzeHighlight)" stroke-width="3" />

  <!-- クロスした剣 -->
  <g filter="url(#metalBump)">
    <!-- 剣1 -->
    <g transform="rotate(45, 200, 200)">
      <rect x="195" y="110" width="10" height="150" fill="url(#bronzeHighlight)" rx="2" />
      <rect x="175" y="240" width="50" height="8" fill="#5d2e0c" rx="2" />
      <circle cx="200" cy="255" r="10" fill="#8b4513" />
    </g>
    <!-- 剣2 -->
    <g transform="rotate(-45, 200, 200)">
      <rect x="195" y="110" width="10" height="150" fill="url(#bronzeHighlight)" rx="2" />
      <rect x="175" y="240" width="50" height="8" fill="#5d2e0c" rx="2" />
      <circle cx="200" cy="255" r="10" fill="#8b4513" />
    </g>
  </g>

  <!-- 撃破を象徴するスカル（小）または中心飾り -->
  <circle cx="200" cy="200" r="25" fill="url(#bronzeGradient)" stroke="#ff9966" stroke-width="1" />
  <path d="M190,195 L210,195 L205,215 L195,215 Z" fill="#3e2723" /> <!-- 簡易的な盾/勲章の中央飾り -->

  <!-- テキスト: 撃破 (KILLS) - 円周に沿って -->
  <defs>
    <path id="textPath" d="M 100, 200 a 100,100 0 1,1 200,0 a 100,100 0 1,1 -200,0" />
  </defs>
  <text fill="#ff9966" font-family="serif" font-size="20" font-weight="bold" letter-spacing="5">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">ELIMINATION HONOR</textPath>
  </text>
</svg>
