<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 銅の質感を表現するグラデーション -->
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b87333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cd7f32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金属の光沢を表現するオーバーレイ -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </linearGradient>

    <!-- 影のエフェクト -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背後のリボン部分（銅色の布をイメージ） -->
  <path d="M150 50 L250 50 L270 150 L130 150 Z" fill="#8b4513" stroke="#5d2e0c" stroke-width="2" />
  <path d="M170 50 L190 150 M210 50 L210 150 M230 50 L230 150" stroke="#cd7f32" stroke-width="3" stroke-opacity="0.5" />

  <!-- 交差する剣（守護の象徴） -->
  <g filter="url(#shadow)">
    <!-- 剣1 -->
    <path d="M110 300 L290 120" stroke="url(#bronzeGradient)" stroke-width="12" stroke-linecap="round" />
    <path d="M130 280 L150 300" stroke="url(#bronzeGradient)" stroke-width="20" stroke-linecap="round" />
    <!-- 剣2 -->
    <path d="M110 120 L290 300" stroke="url(#bronzeGradient)" stroke-width="12" stroke-linecap="round" />
    <path d="M130 140 L150 120" stroke="url(#bronzeGradient)" stroke-width="20" stroke-linecap="round" />
  </g>

  <!-- メダル本体（外枠） -->
  <circle cx="200" cy="230" r="75" fill="url(#bronzeGradient)" stroke="#5d2e0c" stroke-width="3" filter="url(#shadow)" />
  
  <!-- メダル内側の装飾円 -->
  <circle cx="200" cy="230" r="65" fill="none" stroke="#8b4513" stroke-width="2" stroke-dasharray="4 2" />

  <!-- 盾（装甲の象徴） -->
  <g fill="none" stroke="#5d2e0c" stroke-width="4">
    <!-- 盾のメイン形状 -->
    <path d="M170 195 L230 195 L230 230 Q230 265 200 280 Q170 265 170 230 Z" fill="url(#bronzeGradient)" />
    <!-- 盾の中央の補強ライン -->
    <path d="M200 195 L200 280" stroke-width="2" />
    <!-- 四隅のリベット（装甲板のイメージ） -->
    <circle cx="180" cy="205" r="2" fill="#5d2e0c" />
    <circle cx="220" cy="205" r="2" fill="#5d2e0c" />
    <circle cx="180" cy="235" r="2" fill="#5d2e0c" />
    <circle cx="220" cy="235" r="2" fill="#5d2e0c" />
  </g>

  <!-- 勝利の月桂樹（簡易版） -->
  <path d="M140 260 Q130 230 140 200" fill="none" stroke="#5d2e0c" stroke-width="2" />
  <path d="M260 260 Q270 230 260 200" fill="none" stroke="#5d2e0c" stroke-width="2" />

  <!-- 光沢仕上げのオーバーレイ -->
  <circle cx="200" cy="230" r="75" fill="url(#shineGradient)" pointer-events="none" />
</svg>
